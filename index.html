<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다음 주 연차쓰기 좋은 날 추천</title>
    <link rel="stylesheet" href="style.css">
    <script>
        try {
            const savedTheme = localStorage.getItem('pto-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
        } catch {
            document.documentElement.dataset.theme = 'light';
        }
    </script>
</head>
<body>
    <main class="app">
        <nav class="project-switcher" aria-label="프로젝트 선택">
            <a class="project-link active" href="index.html">첫번째 프로젝트</a>
            <a class="project-link" href="animal-test.html">두번째 프로젝트</a>
        </nav>

        <section class="planner" aria-labelledby="page-title">
            <header class="planner-header">
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 변경">
                    <span class="theme-icon" aria-hidden="true">☀</span>
                    <span class="theme-text">화이트</span>
                </button>
                <nav class="page-nav" aria-label="페이지">
                    <a class="nav-link active" href="index.html">연차 추천</a>
                    <a class="nav-link" href="comments.html">댓글</a>
                    <a class="nav-link" href="contact.html">제휴 문의</a>
                </nav>
                <p class="eyebrow">NEXT WEEK PTO PICKER</p>
                <h1 id="page-title">다음 주 연차쓰기 좋은 날</h1>
                <p class="summary">앞뒤로 쉬는 날이 이어지는지와 활동하기 좋은 날씨인지에 따라 점수를 차등 계산합니다.</p>
            </header>

            <div class="planner-content">
                <form class="controls" id="searchForm">
                    <label for="cityInput">날씨 기준 지역</label>
                    <div class="input-row">
                        <input id="cityInput" name="city" type="text" value="서울" autocomplete="address-level2">
                        <button type="submit">추천 다시 보기</button>
                    </div>
                </form>

                <section class="best-pick" id="bestPick" aria-live="polite">
                    <p class="loading">다음 주 일정과 날씨를 확인하는 중입니다.</p>
                </section>

                <section class="day-list" id="dayList" aria-label="상위 추천일"></section>

            </div>
        </section>
    </main>

    <script src="theme.js"></script>
    <script src="app.js"></script>
</body>
</html>

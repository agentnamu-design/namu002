<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - 다음 주 연차쓰기 좋은 날 추천</title>
    <link rel="stylesheet" href="style.css">
    <script>
        try {
            const savedTheme = localStorage.getItem('pto-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
        } catch {
            document.documentElement.dataset.theme = 'light';
        }
    </script>
</head>
<body>
    <main class="app">
        <section class="planner" aria-labelledby="page-title">
            <header class="planner-header">
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 변경">
                    <span class="theme-icon" aria-hidden="true">☀</span>
                    <span class="theme-text">화이트</span>
                </button>
                <nav class="page-nav" aria-label="페이지">
                    <a class="nav-link" href="index.html">연차 추천</a>
                    <a class="nav-link" href="comments.html">댓글</a>
                    <a class="nav-link active" href="contact.html">제휴 문의</a>
                </nav>
                <p class="eyebrow">PARTNERSHIP</p>
                <h1 id="page-title">제휴 문의</h1>
                <p class="summary">서비스 협업, 광고, 콘텐츠 제안은 별도 문의 폼으로 보내주세요.</p>
            </header>

            <div class="planner-content">
                <form class="contact-form standalone" action="https://formspree.io/f/xdabegea" method="POST">
                    <input type="hidden" name="_subject" value="다음 주 연차 추천 서비스 제휴 문의">
                    <input class="hidden-field" type="text" name="_gotcha" tabindex="-1" autocomplete="off">
                    <div class="contact-heading">
                        <p class="best-label">제휴 문의</p>
                        <h2>서비스 협업을 제안해 주세요</h2>
                    </div>
                    <div class="form-grid">
                        <label for="partnerName">
                            이름
                            <input id="partnerName" name="name" type="text" autocomplete="name" required>
                        </label>
                        <label for="partnerEmail">
                            이메일
                            <input id="partnerEmail" name="email" type="email" autocomplete="email" required>
                        </label>
                    </div>
                    <label for="partnerCompany">
                        회사/브랜드
                        <input id="partnerCompany" name="company" type="text" autocomplete="organization">
                    </label>
                    <label for="partnerMessage">
                        문의 내용
                        <textarea id="partnerMessage" name="message" rows="6" required></textarea>
                    </label>
                    <button type="submit">문의 보내기</button>
                </form>
            </div>
        </section>
    </main>

    <script src="theme.js"></script>
</body>
</html>
